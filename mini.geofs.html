<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mini GeoFS Style Sim</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
    #hud {
      position: fixed;
      top: 10px;
      left: 10px;
      color: #0f0;
      font-family: monospace;
      font-size: 14px;
      background: rgba(0,0,0,0.4);
      padding: 8px 10px;
      border-radius: 4px;
      pointer-events: none;
      white-space: pre;
    }
    #instr {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: #0f0;
      font-family: monospace;
      font-size: 13px;
      background: rgba(0,0,0,0.5);
      padding: 6px 10px;
      border-radius: 4px;
      pointer-events: none;
      white-space: pre;
      text-align: center;
    }
  </style>
</head>
<body>
<div id="hud"></div>
<div id="instr"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
/* Multiplayer server (optional):
   server.js:
   const WebSocket = require("ws");
   const wss = new WebSocket.Server({ port: 8080 });
   wss.on("connection", ws => {
     ws.on("message", msg => {
       wss.clients.forEach(client => {
         if (client !== ws && client.readyState === WebSocket.OPEN) {
           client.send(msg);
         }
       });
     });
   });
*/

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  200000
);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const sun = new THREE.DirectionalLight(0xffffff, 1.0);
sun.position.set(1000, 2000, 1000);
scene.add(sun);

const ambient = new THREE.AmbientLight(0xffffff, 0.3);
scene.add(ambient);

const aircraft = new THREE.Object3D();

const fuselage = new THREE.Mesh(
  new THREE.BoxGeometry(2, 1, 10),
  new THREE.MeshStandardMaterial({ color: 0x0077ff })
);
aircraft.add(fuselage);

const wing = new THREE.Mesh(
  new THREE.BoxGeometry(12, 0.2, 2),
  new THREE.MeshStandardMaterial({ color: 0xcccccc })
);
aircraft.add(wing);

const tail = new THREE.Mesh(
  new THREE.BoxGeometry(2, 1, 2),
  new THREE.MeshStandardMaterial({ color: 0x0077ff })
);
tail.position.set(0, 0.5, 5);
aircraft.add(tail);

const nose = new THREE.Mesh(
  new THREE.ConeGeometry(1, 3, 16),
  new THREE.MeshStandardMaterial({ color: 0x0055aa })
);
nose.rotation.x = Math.PI / 2;
nose.position.set(0, 0, -6.5);
aircraft.add(nose);

const cockpitRef = new THREE.Object3D();
cockpitRef.position.set(0, 0.3, -3.5);
aircraft.add(cockpitRef);

scene.add(aircraft);

aircraft.position.set(0, 1000, 0);

let velocity = new THREE.Vector3(0, 0, -80);
let pitch = 0, roll = 0, yaw = 0;

const mass = 1200;
const wingArea = 16;
const airDensity = 1.225;
let dragCoef = 0.025;
let liftCoef = 0.9;
let thrust = 22000;

let throttle = 0.7;
let flaps = 0;

const keys = {};
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

const tileSize = 2000;
const tileCount = 5;
const groundTiles = [];

function createTile(x, z) {
  const geo = new THREE.PlaneGeometry(tileSize, tileSize);
  const color = (x + z) % 2 === 0 ? 0x228b22 : 0x2e8b57;
  const mat = new THREE.MeshStandardMaterial({ color });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.x = -Math.PI / 2;
  scene.add(mesh);
  groundTiles.push(mesh);
}

for (let x = -2; x <= 2; x++)
  for (let z = -2; z <= 2; z++)
    createTile(x, z);

function updateTerrain() {
  const ax = aircraft.position.x;
  const az = aircraft.position.z;

  const cx = Math.round(ax / tileSize);
  const cz = Math.round(az / tileSize);

  let i = 0;
  for (let x = -2; x <= 2; x++) {
    for (let z = -2; z <= 2; z++) {
      const tile = groundTiles[i++];
      tile.position.set((cx + x) * tileSize, 0, (cz + z) * tileSize);
    }
  }
}

let ws = null;
const myId = Math.random().toString(36).slice(2);
const others = new Map();

function connectWS() {
  try {
    ws = new WebSocket("ws://localhost:8080");
    ws.onmessage = msg => {
      const d = JSON.parse(msg.data);
      if (d.id === myId) return;

      let obj = others.get(d.id);
      if (!obj) {
        const mesh = new THREE.Mesh(
          new THREE.BoxGeometry(2, 1, 10),
          new THREE.MeshStandardMaterial({ color: 0xff0000 })
        );
        const container = new THREE.Object3D();
        container.add(mesh);
        scene.add(container);
        obj = container;
        others.set(d.id, obj);
      }
      obj.position.set(d.pos.x, d.pos.y, d.pos.z);
      obj.rotation.set(d.rot.x, d.rot.y, d.rot.z);
    };
  } catch {}
}
connectWS();

setInterval(() => {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({
    id: myId,
    pos: aircraft.position,
    rot: aircraft.rotation
  }));
}, 100);

const hud = document.getElementById("hud");
const instr = document.getElementById("instr");

let lastAlt = aircraft.position.y;
let cockpitView = false;

window.addEventListener("keydown", e => {
  if (e.key === "c") cockpitView = !cockpitView;
});

function updateHUD(dt) {
  const speed = velocity.length();
  const alt = aircraft.position.y;
  const vsi = (alt - lastAlt) / dt;
  lastAlt = alt;

  const deg = 180 / Math.PI;

  hud.textContent =
    "SPD: " + speed.toFixed(1) + " m/s\n" +
    "ALT: " + alt.toFixed(1) + " m\n" +
    "PIT: " + (pitch*deg).toFixed(1) + "°\n" +
    "ROL: " + (roll*deg).toFixed(1) + "°\n" +
    "YAW: " + (yaw*deg).toFixed(1) + "°\n" +
    "VSI: " + vsi.toFixed(1) + " m/s\n" +
    "THR: " + Math.round(throttle*100) + "%\n" +
    "FLP: " + Math.round(flaps*100) + "%\n" +
    "(W/S pitch, A/D roll, Q/E yaw, +/- throttle, F/G flaps, C view)";

  instr.textContent =
    "ATT: pitch " + (pitch*deg).toFixed(1) +
    "°, roll " + (roll*deg).toFixed(1) +
    "°\nVIEW: " + (cockpitView ? "COCKPIT" : "CHASE");
}

function handleControls(dt) {
  const pr = 0.4, rr = 0.6, yr = 0.3;

  if (keys["w"]) pitch -= pr*dt;
  if (keys["s"]) pitch += pr*dt;
  if (keys["a"]) roll += rr*dt;
  if (keys["d"]) roll -= rr*dt;
  if (keys["q"]) yaw += yr*dt;
  if (keys["e"]) yaw -= yr*dt;

  if (keys["+"] || keys["="]) throttle = Math.min(1, throttle + 0.3*dt);
  if (keys["-"]) throttle = Math.max(0, throttle - 0.3*dt);

  if (keys["f"]) flaps = Math.min(1, flaps + 0.3*dt);
  if (keys["g"]) flaps = Math.max(0, flaps - 0.3*dt);

  liftCoef = 0.9 + flaps*0.6;
  dragCoef = 0.025 + flaps*0.05;
}

function updatePhysics(dt) {
  const e = new THREE.Euler(pitch, yaw, roll, "XYZ");
  aircraft.rotation.copy(e);

  const forward = new THREE.Vector3(0,0,-1).applyEuler(e).normalize();
  const up = new THREE.Vector3(0,1,0).applyEuler(e).normalize();

  const speed = velocity.length();

  const thrustF = forward.clone().multiplyScalar(thrust*throttle);
  const lift = 0.5*airDensity*speed*speed*wingArea*liftCoef;
  const liftF = up.clone().multiplyScalar(lift);

  const drag = 0.5*airDensity*speed*speed*dragCoef;
  const dragF = speed>0.1 ? velocity.clone().normalize().multiplyScalar(-drag) : new THREE.Vector3();

  const gravity = new THREE.Vector3(0,-9.81*mass,0);

  const total = new THREE.Vector3()
    .add(thrustF)
    .add(liftF)
    .add(dragF)
    .add(gravity);

  const accel = total.divideScalar(mass);
  velocity.add(accel.multiplyScalar(dt));

  if (aircraft.position.y <= 0 && velocity.y < 0) {
    aircraft.position.y = 0;
    velocity.y = 0;
  }

  aircraft.position.add(velocity.clone().multiplyScalar(dt));
}

function updateCamera() {
  if (cockpitView) {
    const pos = new THREE.Vector3();
    cockpitRef.getWorldPosition(pos);
    const forward = new THREE.Vector3(0,0,-1).applyEuler(aircraft.rotation);
    camera.position.copy(pos);
    camera.lookAt(pos.clone().add(forward));
  } else {
    const offset = new THREE.Vector3(0,5,20).applyEuler(aircraft.rotation);
    camera.position.copy(aircraft.position).add(offset);
    camera.lookAt(aircraft.position);
  }
}

let lastTime = performance.now();

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = Math.min((now-lastTime)/1000, 0.05);
  lastTime = now;

  handleControls(dt);
  updatePhysics(dt);
  updateTerrain();
  updateCamera();
  updateHUD(dt);

  renderer.render(scene, camera);
}

animate();

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
